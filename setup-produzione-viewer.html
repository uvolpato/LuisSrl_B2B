<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup produzione — Luis S.r.l.</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: oklch(98% 0.002 80);
      --surface: oklch(100% 0 0);
      --fg: oklch(22% 0.02 60);
      --muted: oklch(52% 0.015 60);
      --border: oklch(88% 0.01 70);
      --accent: oklch(55% 0.14 45);
      --accent-soft: color-mix(in oklch, var(--accent) 10%, transparent);
      --code-bg: oklch(96% 0.005 80);
      --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, Menlo, monospace;
    }
    .container { max-width: 1120px; margin-inline: auto; padding-inline: 32px; }
    .meta { font-family: var(--font-mono); font-size: 13px; color: var(--muted); }
    .pagefoot { padding-block: 15px; color: var(--muted); font-size: 13px; border-top: 1px solid var(--border); }
    .pagefoot .row-between { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: color-mix(in oklch, var(--surface) 85%, transparent);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
    }
    .topbar a:hover { text-decoration: underline; }
    .topbar .sep { color: var(--muted); }
    .topbar .title {
      font-weight: 600;
      font-size: 15px;
      color: var(--fg);
    }
    .toc-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .toc-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .layout {
      display: flex;
      max-width: 1280px;
      margin: 0 auto;
    }
    .toc {
      position: sticky;
      top: 53px;
      align-self: flex-start;
      width: 260px;
      min-width: 260px;
      height: calc(100vh - 53px);
      overflow-y: auto;
      padding: 24px 16px 24px 32px;
      border-right: 1px solid var(--border);
      font-size: 13px;
      line-height: 1.6;
      scrollbar-width: thin;
    }
    .toc.hidden { display: none; }
    .toc a {
      display: block;
      color: var(--muted);
      text-decoration: none;
      padding: 3px 0;
      border-radius: 4px;
      transition: color 0.1s;
    }
    .toc a:hover { color: var(--accent); }
    .toc a.h3 { padding-left: 16px; font-size: 12px; }
    .toc a.active { color: var(--accent); font-weight: 500; }
    .content {
      flex: 1;
      min-width: 0;
      padding: 40px 48px 120px;
      max-width: 820px;
    }
    h1 { font-size: 32px; letter-spacing: -0.02em; margin: 0 0 8px; line-height: 1.2; }
    h2 {
      font-size: 24px;
      letter-spacing: -0.01em;
      margin: 48px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      line-height: 1.3;
    }
    h3 { font-size: 18px; margin: 32px 0 12px; line-height: 1.35; }
    p { margin: 0 0 16px; }
    strong { font-weight: 600; }
    blockquote {
      margin: 16px 0;
      padding: 12px 20px;
      border-left: 3px solid var(--accent);
      background: var(--accent-soft);
      border-radius: 0 8px 8px 0;
      color: var(--fg);
      font-size: 14px;
    }
    blockquote p { margin: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
    }
    th, td {
      text-align: left;
      padding: 10px 14px;
      border: 1px solid var(--border);
    }
    th {
      background: var(--code-bg);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    tr:nth-child(even) td { background: color-mix(in oklch, var(--surface) 60%, var(--bg)); }
    code {
      font-family: var(--font-mono);
      font-size: 13px;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
    }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.6;
    }
    pre code { background: none; padding: 0; }
    ul, ol { padding-left: 24px; margin: 0 0 16px; }
    li { margin-bottom: 4px; }
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }
    a { color: var(--accent); }
    img { max-width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    @media (max-width: 860px) {
      .toc { display: none; }
      .content { padding: 24px 20px 80px; }
      h1 { font-size: 26px; }
      h2 { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html">Prototipo B2B</a>
    <span class="sep">/</span>
    <span class="title">Setup produzione</span>
    <button class="toc-toggle" onclick="document.querySelector('.toc').classList.toggle('hidden')">Indice</button>
  </div>
  <div class="layout">
    <nav class="toc" id="toc"></nav>
    <article class="content" id="content"></article>
  </div>
  <script>
    fetch('SETUP-PRODUZIONE.md')
      .then(r => r.text())
      .then(md => {
        document.getElementById('content').innerHTML = marked.parse(md);
        buildToc();
        observeHeadings();
      });

    function buildToc() {
      const headings = document.querySelectorAll('#content h2, #content h3');
      const toc = document.getElementById('toc');
      headings.forEach((h, i) => {
        h.id = 'h-' + i;
        const a = document.createElement('a');
        a.href = '#h-' + i;
        a.textContent = h.textContent;
        if (h.tagName === 'H3') a.className = 'h3';
        toc.appendChild(a);
      });
    }

    function observeHeadings() {
      const links = document.querySelectorAll('#toc a');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            links.forEach(l => l.classList.remove('active'));
            const link = document.querySelector('#toc a[href="#' + e.target.id + '"]');
            if (link) link.classList.add('active');
          }
        });
      }, { rootMargin: '-60px 0px -80% 0px' });
      document.querySelectorAll('#content h2, #content h3').forEach(h => observer.observe(h));
    }
  </script>

  <footer class="pagefoot" data-od-id="footer">
    <div class="container row-between">
      <span>© 2026 Luis S.r.l. · Via F. Bellafino 28/30, Bergamo</span>
      <span class="meta">info@luisbg.it · +39 035 0521957</span>
      <span class="meta">Realizzato da <strong>Ugo Volpato</strong> AI Consultant</span>
    </div>
  </footer>
</body>
</html>
